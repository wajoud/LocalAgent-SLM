<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <h1>Local Agent <span>Multi-SLM</span></h1>
            <p>Powered by FastAPI, CrewAI, and Ollama</p>
        </header>

        <main class="chat-container">
            <div id="chat-box" class="chat-box">
                <div class="message system-message">
                    <div class="avatar">🤖</div>
                    <div class="content">Hello! I am your local Multi-Agent system. I can search the web, read Wikipedia, and calculate math. How can I help you today?</div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your message here... e.g. What is 25 * 45?" autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
